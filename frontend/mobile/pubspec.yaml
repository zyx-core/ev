name: ievc_eco_app
description: "IEVC-eco - Intelligent EV Charging App for EV Drivers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # HTTP client
  http: ^1.2.0
  
  # State management
  provider: ^6.1.1
  
  # Location services
  geolocator: ^11.0.0
  
  # URL launcher
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
